name: Sync WC Match Results

on:
  schedule:
    # 30 min after matches ending on the hour (UTC)
    - cron: "10 0,1,2,3,4,5,6,18,19,20,21,22,23 * * *"
    # 30 min after matches ending at :30 (UTC)
    - cron: "40 1,2,3,4,22 * * *"
    # Daily at 08:00 Danish time (= 06:00 UTC during CEST)
    - cron: "0 6 * * *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger match sync
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET \
            "https://cl-auktion.vercel.app/api/sync-matches")
          body=$(echo "$response" | head -1)
          status=$(echo "$response" | tail -1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "Sync failed with status $status"
            exit 1
          fi
